<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Dealership - 회원가입</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #000000, #434343); /* 자동차 느낌의 어두운 톤 */
            font-family: 'Arial', sans-serif;
            color: white;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            background: linear-gradient(to right, #FF8008, #FFC837); /* 주황색 그라데이션 */
            border-radius: 15px 15px 0 0;
        }

        .card-header h3 {
            font-weight: bold;
        }

        .form-label {
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(to right, #FF8008, #FFC837); /* 자동차 판매를 연상시키는 색상 */
            border: none;
            transition: transform 0.2s, background 0.3s;
        }

        .btn-primary:hover {
            background: linear-gradient(to right, #FFC837, #FF8008);
            transform: scale(1.05);
        }

        .card-footer {
            font-size: 0.9rem;
        }

        .card-footer a {
            color: #FFC837;
        }

        .card-footer a:hover {
            text-decoration: underline;
        }

        .alert {
            font-size: 0.875rem;
        }

        .form-check-label {
            font-weight: 500;
        }

        /* 자동차 로고 이미지 */
        .car-logo {
            width: 100px;
            margin: 0 auto;
            display: block;
        }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header text-white text-center py-3">
                    <h3>회원가입</h3>
                    <p>자동차 구매를 위한 계정을 만들어보세요</p>
                </div>
                <div class="card-body p-4">
                    <form action="/join" method="post">
                        <div class="mb-3">
                            <label for="email" class="form-label">이메일 (ID)</label>
                            <input type="email" class="form-control" id="email" name="email" placeholder="example@email.com" required>
                        </div>
                        <div class="alert alert-danger" th:if="${errorname}" th:text="${errorname}">
                            <!-- 에러 메시지가 여기에 표시됩니다. -->
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">비밀번호</label>
                            <input type="password" class="form-control" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
                        </div>
                        <div class="mb-3">
                            <label for="name" class="form-label">이름</label>
                            <input type="text" class="form-control" id="name" placeholder="홍길동" name="name" required>
                        </div>
                        <div class="mb-3">
                            <label for="phonenumber" class="form-label">전화번호</label>
                            <input type="text" class="form-control" id="phonenumber" placeholder="010-1234-5678" name="phonenumber" required>
                        </div>
                        <div class="mb-3">
                            <label for="adress" class="form-label">주소</label>
                            <input type="text" class="form-control" id="adress" placeholder="오산시 금암동" name="adress">
                        </div>
                        <div class="mb-3">
                            <label for="age" class="form-label">나이</label>
                            <input type="text" class="form-control" id="age" placeholder="27" name="age">
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="gridCheck">
                            <label class="form-check-label" for="gridCheck">
                                약관에 동의합니다
                            </label>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">회원가입</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center text-muted py-2">
                    이미 계정이 있으신가요? <a href="/car-dealer/login" class="text-decoration-none">로그인</a>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
