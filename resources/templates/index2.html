<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeungCar Navbar and Sidebar</title>

    <!-- Bootstrap CSS 추가 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: url('https://images.unsplash.com/photo-1647418552401-f3958302b72a?fm=jpg&q=60&w=3000&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8JUVEJTk4JTg0JUVCJThDJTgwJTIwJUVDJTlEJUI0JUVDJTk4JUE0JUVCJThCJTg5NXxlbnwwfHwwfHx8MA%3D%3D') no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        /* 상단바 스타일 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: rgba(0, 0, 0, 0.8); /* 반투명 검정 */
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }

        .navbar .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #FFD700; /* 금색 */
            text-transform: uppercase;
            text-align: center;
            flex: 1; /* 중앙 정렬 */
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        /* 사이드바 스타일 */
        .sidebar {
            position: fixed;
            top: 60px;
            left: 0;
            height: calc(100% - 60px);
            width: 250px;
            background-color: #444;
            padding-top: 20px;
            transform: translateX(-100%);
            transition: transform 0.3s ease-in-out;
            z-index: 900;
        }

        .sidebar.active {
            transform: translateX(0);
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px 20px;
            font-size: 18px;
        }

        .sidebar a:hover {
            background-color: #575757;
        }

        /* 검색 바 섹션 */
        .search-section {
            margin-top: 80px;
            text-align: center;
        }

        .search-bar {
            width: 80%;
            max-width: 600px;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 4px;
            outline: none;
        }

        .search-bar:focus {
            border-color: #555;
        }

        .search-button {
            padding: 10px 20px;
            font-size: 16px;
            color: white;
            background-color: #555;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .search-button:hover {
            background-color: #777;
        }

        /* 이미지 섹션 */
        .image-section {
            text-align: center;
            margin: 30px auto;
        }

        .image-section img {
            max-width: 80%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        /* 콘텐츠 섹션 */
        .content {
            padding: 20px;
            text-align: center;
        }

        .content h1 {
            font-size: 50px;
            color: #FFD700;
            margin-bottom: 20px;
        }

        .content p {
            font-size: 18px;
        }
    </style>
</head>
<body>
<!-- 상단바 -->
<div class="navbar">
    <button class="hamburger">☰</button>
    <div class="logo">SeungCar</div>
    <div class="navbar-links">
        <a href="#home">Home</a>
        <a href="/logout" th:text="${username}">로그인</a>
        <a href="/car/model">모델</a>
        <a href="#services">기능대기</a>
        <a href="#contact">기능대기</a>
        <button type="button" class="btn btn-outline-secondary">Secondary</button>
    </div>
</div>

<!-- 사이드바 -->
<div class="sidebar">
    <a href="/user/collections">회원 목록</a>
    <a href="#profile">Profile</a>
    <a href="#settings">Settings</a>
    <a href="#logout">Logout</a>
    <a href="/board">게시판 문의</a>
</div>

<!-- 검색 섹션 -->
<form action="/search" method="post">
<div class="search-section">
    <input type="text" class="search-bar" name ="search" placeholder="Search for cars, services, or more...">
    <button class="search-button">Search</button>
</div>
</form>
<!-- 이미지 섹션 -->


<!-- 페이지 콘텐츠 -->
<div class="content">

    <h1>
        <div th:if="${username}" th:text="${username ?: '방문자'} + '님'"></div>


        Welcome to SeungCar</h1>
    <p>Your ultimate destination for car sales and services.</p>
</div>

<!-- Bootstrap JS 추가 -->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
<script>
    const hamburger = document.querySelector('.hamburger');
    const sidebar = document.querySelector('.sidebar');

    // 햄버거 버튼 클릭 이벤트
    hamburger.addEventListener('click', () => {
        sidebar.classList.toggle('active');
    });
</script>
</body>
</html>
