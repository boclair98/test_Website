<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>간단한 게시판</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2 class="mb-4">📌 게시판</h2>

    <form action="/board" method="post">
    <!-- 게시글 작성 폼 -->
    <div class="card p-4 mb-4">
        <h5>게시글 작성</h5>
        <div class="mb-3">
            <label for="title" class="form-label">제목</label>
            <input type="text" id="title" class="form-control"  name ="title" placeholder="제목을 입력하세요">
        </div>
        <div class="mb-3">
            <label for="writer" class="form-label">작성자</label>
            <input type="text" id="writer" class="form-control" name="writer" placeholder="작성자 이름">
        </div>
        <div class="mb-3">
            <label for="text" class="form-label">내용</label>
            <textarea id="text" class="form-control" rows="4" name="text" placeholder="내용을 입력하세요"></textarea>
        </div>
        <button class="btn btn-primary" onclick="addPost()">게시글 등록</button>
    </div>
    </form>
    <!-- 게시글 목록 -->
    <h5>📃 게시글 목록</h5>
    <ul id="postList" class="list-group">
        <!-- 여기에 게시글이 추가될 예정 -->
    </ul>
</div>

<!-- JavaScript -->
<script>
    function addPost() {
        // 입력값 가져오기
        let title = document.getElementById("title").value;
        let author = document.getElementById("author").value;
        let content = document.getElementById("content").value;

        // 값이 비어있는지 확인
        if (title.trim() === "" || author.trim() === "" || content.trim() === "") {
            alert("제목, 작성자, 내용을 모두 입력해주세요!");
            return;
        }

        // 새로운 게시글 요소 만들기
        let postItem = document.createElement("li");
        postItem.classList.add("list-group-item");

        postItem.innerHTML = `
            <h6>📌 ${title} <small class="text-muted">- ${author}</small></h6>
            <p>${content}</p>
        `;

        // 게시글 목록에 추가
        document.getElementById("postList").prepend(postItem);

        // 입력창 초기화
        document.getElementById("title").value = "";
        document.getElementById("author").value = "";
        document.getElementById("content").value = "";
    }
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
